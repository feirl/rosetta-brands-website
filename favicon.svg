<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #ffffff }
    @media (prefers-color-scheme: dark) { .bg { fill: #2d2933 } }
  </style>
  <!-- Background -->
  <circle class="bg" cx="16" cy="16" r="16"/>
  <!-- Outer orange arc ~300deg -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#f17d02" stroke-width="2.5"
    stroke-dasharray="65.5 13.1" stroke-linecap="round"
    transform="rotate(120 16 16)"/>
  <!-- Middle pink arc ~300deg -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#e8347a" stroke-width="2"
    stroke-dasharray="44.5 8.9" stroke-linecap="round"
    transform="rotate(120 16 16)"/>
  <!-- Inner periwinkle arc ~300deg -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#7f80c0" stroke-width="2.5"
    stroke-dasharray="23.6 4.7" stroke-linecap="round"
    transform="rotate(120 16 16)"/>
</svg>
